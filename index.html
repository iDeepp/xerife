<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Xerife do Pelotão</title>
  
<style>
  body {
  margin: 0;
  font-family: Arial, sans-serif;

  background: 
    url("fundo.png"),
    radial-gradient(circle at center, rgba(0,0,0,0.6), #000);

  background-blend-mode: soft-light;

  background-size: cover;
  background-position: center;

  color: #e5e5e5;

  /* display: flex; */ 
  justify-content: center;
   text-align: center;
   padding: 20px;
}

  .logo {
    width: 180px;

  filter:
    drop-shadow(0 0 10px rgba(212,175,55,0.6))
    drop-shadow(0 0 20px rgba(212,175,55,0.3));
  }
.destaque {
  color: #d4af37; /* escolha a cor que quiser */
  font-weight: bold;
}
  h1 {
  color: #d4af37;
  letter-spacing: 3px;
  color: #d4af37;
  text-shadow: 0 0 10px rgba(212,175,55,0.5);

  text-shadow:
    0 0 5px rgba(212,175,55,0.7),
    0 0 15px rgba(212,175,55,0.4);
}

  textarea {
  width: 99%;
  height: 150px;

  background: rgba(10, 10, 10, 0.85);
  color: #f5f5f5;

  border: 1px solid #d4af37;
  border-radius: 12px;
  padding: 10px;

  box-shadow:
    0 0 10px rgba(212,175,55,0.2),
    inset 0 0 10px rgba(255,255,255,0.05);
}

  button {
  margin: 6px;
  padding: 10px 18px;

  border-radius: 10px;
  border: 1px solid #d4af37;

  background: linear-gradient(145deg, #111, #000);
  color: #d4af37;

  font-weight: bold;
  cursor: pointer;

  transition: 0.2s;
}

  button:hover {
  background: #d4af37;
  color: #000;

  box-shadow:
    0 0 10px #d4af37,
    0 0 20px rgba(212,175,55,0.5);
}

  .container {
  background: rgba(0,0,0,0.6);

  border: 1px solid rgba(212,175,55,0.3);
  border-radius: 15px;

  padding: 20px;
  margin-top: 30px;

  box-shadow:
    0 0 20px rgba(212,175,55,0.1),
    inset 0 0 10px rgba(212,175,55,0.05);
}

footer {
  position: fixed;
  bottom: 10px;
  left: 0;
  right: 0; /* garante centralização perfeita */

  display: flex;
  justify-content: center;

  font-size: 12px;
  color: rgba(212,175,55,0.7); /* tom dourado semelhante */
  padding-top: 5px;

  /* linha dourada que se apaga nas extremidades */
  border-top: none;
  background: linear-gradient(to right, rgb(212 175 55 / 10%) 0%, rgba(212, 175, 55, 0.3) 50%, rgb(212 175 55 / 10%) 100%);
  background-repeat: no-repeat;
  background-position: top;
  background-size: 100% 1px; /* altura da linha */
}


  h1, h2, p {
  text-align: center;
}
</style>
</head>
<body>
<footer style="
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  color: #94a3b8;
  display: flex;
  justify-content: center;
  gap: 4px;
">
  Desenvolvido por <span class="destaque"> Ruan Silveira</span>
</footer>
<h1>🦅 2° PELOTÃO FALCÃO</h1>

<h3>📥 Cole a lista do WhatsApp:</h3>
<textarea id="entrada"></textarea>

<br>

<button onclick="verFaltantes()">🚨 Ver faltantes</button>
<button onclick="organizarLista()">📋 Organizar lista</button>
<button onclick="copiarTexto()">📋 Copiar resultado</button>
<button onclick="limpar()">🧹 Limpar</button>

<h3>📤 Resultado:</h3>
<textarea id="saida" readonly></textarea>

<script>
const pelotao = {
  2005: "ANDRYOS HELENO ALVES ADEJANIS",
  2017: "MARLON LUCAS DUARTE DA SILVA",
  2018: "SAMUEL MONTEIRO BRAGA",
  2020: "THIAGO DE QUEIROZ SIMÕES",
  2021: "LUCAS FERREIRA SILVA CAMPOS",
  2023: "GABRIEL CANOPF CARNEIRO",
  2032: "RUAN PONTES DE SOUZA SILVEIRA",
  2037: "EZEQUIEL DA CUNHA RODRIGUES",
  2038: "ELIEL DOS SANTOS GUEDES",
  2042: "RODRIGO NOVAES DUARTE",
  2043: "MARIA EDUARDA CARVALHO CARDOSO",
  2046: "ANNA CLARA DOS REIS PORTUGAL NEPOMUCENA",
  2047: "JESSICA VITORIA DE SOUZA NEREU",
  2048: "ANDRESSA DA FONSECA GOMES",
  2049: "WEVERTON ARAUJO DE OLIVEIRA",
  2050: "MILLENA COSTA SANTOS SANTANA",
  2051: "JULIA NUNES CALZOLARI DE MORAES",
  2053: "MARIA EDUARDA ALVES ROCHA DA SILVA",
  2054: "RAFAELA LOUISE FERREIRA",
  2055: "JENYFER LUIZA DA SILVA BARBOSA",
  2056: "BEATRIZ NEVES NASCIMENTO",
  2057: "ANA CLARA GARCES RODRIGUES",
  2058: "EMILY PONTES CARNEIRO COSTA",
  2059: "MARIA EDUARDA PALHINHA PINTO BARRETO",
  2060: "STELLA ROBERTA ALCANTARA DE SOUZA",
  2061: "PAMELA DE MORAES SOARES",
  2065: "LUIZ GUSTAVO DE SOUZA MARTINS",
  2067: "RENAN DE LUCENA DANTAS",
  2080: "KAYLANI DOS ANJOS VIEIRA"
};

function extrairNumeros(texto) {
  return texto.match(/\d{4}/g)?.map(Number) || [];
}

function verFaltantes() {
  const texto = document.getElementById("entrada").value;

  const presentes = [...new Set(extrairNumeros(texto))];

  const faltantes = Object.keys(pelotao)
    .map(Number)
    .filter(num => !presentes.includes(num))
    .sort((a, b) => a - b); // crescente

  let resultado = `🚨 FALTANTES (${faltantes.length})\n`;
resultado += `📊 TOTAL DO PELOTÃO: ${Object.keys(pelotao).length}\n\n`;

  if (faltantes.length === 0) {
    resultado += "Todos responderam ✅";
  } else {
    faltantes.forEach(num => {
      resultado += `${num} - ${pelotao[num]}\n`;
    });
  }

  document.getElementById("saida").value = resultado;
}
function copiarTexto() {
  const texto = document.getElementById("saida");

  texto.select();
  texto.setSelectionRange(0, 99999); // iPhone

  document.execCommand("copy");

  alert("Texto copiado! ✅");
}

function organizarLista() {
  const texto = document.getElementById("entrada").value;

  const linhas = texto.split("\n");

  const cabecalho = [];
  const rodape = [];
  const mapa = {};

  const regex = /(\d{4})\s*-\s*(\d+)/;

  let encontrouLista = false;

  linhas.forEach(linha => {
    const match = linha.match(regex);

    if (match) {
      encontrouLista = true;

      const numero = Number(match[1]);
      const quantidade = Number(match[2]);

      mapa[numero] = (mapa[numero] || 0) + quantidade;
    } else {
      if (!encontrouLista) {
        cabecalho.push(linha); // antes da lista
      } else {
        rodape.push(linha); // depois da lista
      }
    }
  });

  // ordenar crescente
  const numerosOrdenados = Object.keys(mapa)
    .map(Number)
    .sort((a, b) => a - b);

  // reconstruir texto
  let resultado = "";

  // mantém cabeçalho
  resultado += cabecalho.join("\n") + "\n";

  // lista organizada
  numerosOrdenados.forEach(num => {
    resultado += `${num} - ${mapa[num]}\n`;
  });

  // mantém rodapé (se houver)
  if (rodape.length > 0) {
    resultado += "\n" + rodape.join("\n");
  }

  document.getElementById("saida").value = resultado;
}
function limpar() {
  document.getElementById("entrada").value = "";
  document.getElementById("saida").value = "";
}
</script>

</body>
</html>
